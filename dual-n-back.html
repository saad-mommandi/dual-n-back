<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML 5 Boilerplate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="container">

    <h1>Dual-N-Back</h1>
    <div class="controls">
      <button type="button" id="start-stop">Start</button>
    </div>
    <div id="game_board">
      <div class="row">
        <div class="cell left_cell top_cell" id="cell_0">
          <div class="visual-cue"></div>
        </div>
        <div class="cell top_cell" id="cell_1">
          <div class="visual-cue"></div>
        </div>
        <div class="cell top_cell right_cell" id="cell_2">
          <div class="visual-cue"></div>
        </div>
      </div>
      <div class="row">
        <div class="cell left_cell" id="cell_3">
          <div class="visual-cue"></div>
        </div>
        <div class="cell" id="cell_4">
          <div class="visual-cue"></div>
        </div>
        <div class="cell right_cell" id="cell_5">
          <div class="visual-cue"></div>
        </div>
      </div>
      <div class="row">
        <div class="cell left_cell bottom_cell" id="cell_6">
          <div class="visual-cue"></div>
        </div>
        <div class="cell bottom_cell" id="cell_7">
          <div class="visual-cue"></div>
        </div>
        <div class="cell bottom_cell right_cell" id="cell_8">
          <div class="visual-cue"></div>
        </div>
      </div>
    </div>
    <div class="controls">
      <button type="button" id="audio-match">Audio Match</button>
      <button type="button" id="visual-match">Visual Match</button>
    </div>




  </div>
<script type="module" src="js/main.js"></script>
</body>
</html>
