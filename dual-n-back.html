<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML 5 Boilerplate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="container">

    <h1>Dual-N-Back</h1>

    <div id="game_board">
      <div class="row">
        <div class="cell left_cell top_cell" id="cell_0">0</div>
        <div class="cell top_cell" id="cell_1">1</div>
        <div class="cell top_cell right_cell" id="cell_2">2</div>
      </div>
      <div class="row">
        <div class="cell left_cell" id="cell_3">3</div>
        <div class="cell" id="cell_4">4</div>
        <div class="cell right_cell" id="cell_5">5</div>
      </div>
      <div class="row">
        <div class="cell left_cell bottom_cell" id="cell_6">6</div>
        <div class="cell bottom_cell" id="cell_7">7</div>
        <div class="cell bottom_cell right_cell" id="cell_8">8</div>
      </div>

    </div>




  </div>
<script src="index.js"></script>
</body>
</html>
